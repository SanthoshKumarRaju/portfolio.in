<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card */
.project-status-card{
    background:white;
    padding:30px;
    width:420px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    text-align:center;
}

/* Status Badge */
.status-badge{
    display:inline-block;
    padding:6px 14px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
    background:#fff3cd;
    color:#856404;
    margin-bottom:15px;
}

/* Title */
.project-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

/* Message */
.project-message{
    color:#555;
    margin-bottom:20px;
    line-height:1.5;
}

/* Info Box */
.info-box{
    background:#f1f4ff;
    border-left:4px solid #4f6ef7;
    padding:12px;
    border-radius:6px;
    font-size:14px;
    color: #1f2937;
}

.highlight{
    color:#4f6ef7;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="project-status-card">

    <div class="status-badge">
        ⏳ In Progress
    </div>

    <!-- <div class="project-title">
        Shell Scripting Project
    </div> -->

    <div class="project-message">
        This project will start once the currently active project is completed.
    </div>

    <div class="info-box">
        🔎 To find the project currently being worked on, go to the 
        <span class="highlight">Projects Page</span> and click the 
        <span class="highlight">"In Progress"</span> filter.
    </div>

</div>

</body>
